<h2 class="font-extrabold text-2xl text-slate-900">Create a new account</h2>
<p class="text-sm text-slate-500 mb-5">its quite simple to create a new account</p>

<form class="space-y-3.5">
  <!-- full name -->
  <div class="relative">
    <span
      class="absolute inset-y-0 inset-s-0 flex items-center ps-3 pointer-events-none text-slate-400"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="lucide lucide-user"
        aria-hidden="true"
      >
        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </svg>
    </span>
    <input type="text" name="name" class="input-field" placeholder="Full name" />
  </div>
  <!-- user name  -->

  <div class="relative">
    <span
      class="absolute inset-y-0 inset-s-0 flex items-center ps-3 pointer-events-none text-slate-400"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="lucide lucide-at-sign"
        aria-hidden="true"
      >
        <circle cx="12" cy="12" r="4"></circle>
        <path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-4 8"></path>
      </svg>
    </span>
    <input type="text" name="username" class="input-field" placeholder="Username (optional)" />
  </div>

  <!-- email address -->

  <div class="relative">
    <span
      class="absolute inset-y-0 inset-s-0 flex items-center ps-3 pointer-events-none text-slate-400"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="lucide lucide-at-sign"
        aria-hidden="true"
      >
        <circle cx="12" cy="12" r="4"></circle>
        <path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-4 8"></path>
      </svg>
    </span>
    <input type="email" name="email" class="input-field" placeholder="Email address" />
  </div>

  <!-- gender  -->
  <div class="relative">
    <span
      class="absolute inset-y-0 inset-s-0 flex items-center ps-3 pointer-events-none text-slate-400"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="lucide lucide-users pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"
        aria-hidden="true"
      >
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
        <path d="M16 3.128a4 4 0 0 1 0 7.744"></path>
        <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
        <circle cx="9" cy="7" r="4"></circle>
      </svg>
    </span>
    <select class="input-field">
      <option selected disabled hidden>Select gender</option>
      <option value="male">Male</option>
      <option value="female">Female</option>
    </select>
  </div>

  <!-- date of birth -->

  <div class="relative">
    <span
      class="absolute inset-y-0 inset-s-0 flex items-center ps-3 pointer-events-none text-slate-400"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="lucide lucide-calendar"
        aria-hidden="true"
      >
        <path d="M8 2v4"></path>
        <path d="M16 2v4"></path>
        <rect width="18" height="18" x="3" y="4" rx="2"></rect>
        <path d="M3 10h18"></path>
      </svg>
    </span>
    <input type="date" name="dateOfBirth" class="input-field" placeholder="Date of birth" />
  </div>

  <!-- password -->

  <div class="relative">
    <span
      class="absolute inset-y-0 inset-s-0 flex items-center ps-3 pointer-events-none text-slate-400"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="lucide lucide-key-round"
        aria-hidden="true"
      >
        <path
          d="M2.586 17.414A2 2 0 0 0 2 18.828V21a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h1a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h.172a2 2 0 0 0 1.414-.586l.814-.814a6.5 6.5 0 1 0-4-4z"
        ></path>
        <circle cx="16.5" cy="7.5" r=".5" fill="currentColor"></circle>
      </svg>
    </span>
    <input type="password" name="password" class="input-field" placeholder="Password" />
  </div>

  <!-- confirm password   -->

  <div class="relative">
    <span
      class="absolute inset-y-0 inset-s-0 flex items-center ps-3 pointer-events-none text-slate-400"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="lucide lucide-key-round"
        aria-hidden="true"
      >
        <path
          d="M2.586 17.414A2 2 0 0 0 2 18.828V21a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h1a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h.172a2 2 0 0 0 1.414-.586l.814-.814a6.5 6.5 0 1 0-4-4z"
        ></path>
        <circle cx="16.5" cy="7.5" r=".5" fill="currentColor"></circle>
      </svg>
    </span>
    <input type="password" name="rePassword" class="input-field" placeholder="Confirm password" />
  </div>

  <button
    class="w-full rounded-xl py-3 text-base font-extrabold text-white transition disabled:opacity-60 bg-main-color hover:bg-[#001f6b]"
  >
    Create New Account
  </button>
</form>
